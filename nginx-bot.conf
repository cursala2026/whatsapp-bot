# 1. Redirección forzada de HTTP a HTTPS
server {
    listen 80;
    server_name webhook.cursala.com.ar;
    return 301 https://$host$request_uri;
}

# 2. Servidor Seguro (HTTPS)
server {
    listen 443 ssl;
    server_name webhook.cursala.com.ar;

    # Certificados que acabamos de generar en el servidor
    ssl_certificate /etc/letsencrypt/live/webhook.cursala.com.ar/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/webhook.cursala.com.ar/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        # TRUCO: Usamos el DNS interno de Docker (127.0.0.11) y una variable.
        # Si el contenedor 'whatsapp-bot' se apaga, Nginx NO se rompe ni se cae Cursala.
        resolver 127.0.0.11 valid=30s;
        set $upstream_bot http://whatsapp-bot:8080;
        proxy_pass $upstream_bot;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
    }
}