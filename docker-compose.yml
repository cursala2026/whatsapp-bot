services:
  whatsapp-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whatsapp-bot
    restart: unless-stopped
    # Este servicio solo maneja el bot y no debe afectar a la web existente.
    # Se expone solo en localhost del VPS; si se necesita acceso externo, debe hacerse
    # mediante un proxy dedicado o un subdominio, sin tocar los puertos de la web actual.
    ports:
      - "127.0.0.1:${HOST_PORT:-8081}:8080"
    networks:
      - whatsapp-bot-net
      - proxy-net
    environment:
      PORT: 8080
      FIREBASE_CREDENTIALS_PATH: /secrets/firebase_service_account.json
      VIRTUAL_HOST: ${VIRTUAL_HOST:-}
      VIRTUAL_PORT: ${VIRTUAL_PORT:-8080}
      VIRTUAL_PROTO: ${VIRTUAL_PROTO:-http}
      ACCESS_TOKEN: ${ACCESS_TOKEN:-}
      VERIFY_TOKEN: ${VERIFY_TOKEN:-}
      PHONE_NUMBER_ID: ${PHONE_NUMBER_ID:-}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      FIRESTORE_COLLECTION: ${FIRESTORE_COLLECTION:-whatsapp_users}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash-lite}
      ENABLE_GEMINI_FALLBACK: ${ENABLE_GEMINI_FALLBACK:-false}
      ADMIN_NUMBER: ${ADMIN_NUMBER:-}
      ADMIN_KEY: ${ADMIN_KEY:-}
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      MAIL_FROM_EMAIL: ${MAIL_FROM_EMAIL:-}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-}
    volumes:
      - ./secrets:/secrets:ro
    mem_limit: 512m
    cpus: 0.5
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  whatsapp-bot-net:
    driver: bridge
  proxy-net:
    external: true
    name: ${SHARED_PROXY_NETWORK:-nginx-proxy}
