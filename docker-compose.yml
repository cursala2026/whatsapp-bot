version: '3.8'

services:
  whatsapp-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whatsapp-bot-app
    restart: always
    environment:
      - FIREBASE_CREDENTIALS_PATH=/secrets/firebase.json
    volumes:
      - ./secrets:/secrets:ro
      - ./.env:/app/.env:ro
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
