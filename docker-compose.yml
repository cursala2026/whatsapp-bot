version: '3.8'

services:
  whatsapp-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whatsapp-bot
    restart: unless-stopped
    # Sin "ports": no se publica nada al host.
    # Solo es alcanzable por nginx-proxy a traves de la red nginx-net.
    networks:
      - nginx-net
    environment:
      - FIREBASE_CREDENTIALS_PATH=/secrets/firebase_service_account.json
    env_file:
      - ./.env
    volumes:
      - ./secrets:/secrets:ro
    mem_limit: 512m
    cpus: 0.5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  nginx-net:
    external: true
