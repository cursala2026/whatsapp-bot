name: Deploy WhatsApp bot to VPS

on:
  push:
    branches:
      - main
      - fix/enviar-credenciales
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate deployment secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          for name in VPS_HOST VPS_USER VPS_SSH_KEY; do
            if [ -z "${!name}" ]; then
              echo "Missing required secret: $name"
              exit 1
            fi
          done

      - name: Verify VPS reachability
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || 22 }}
        run: |
          echo "Testing TCP reachability to $VPS_HOST:$VPS_PORT"
          python - <<'PY'
          import os, socket, sys
          host = os.getenv('VPS_HOST', '')
          port = int(os.getenv('VPS_PORT', '22'))
          try:
              with socket.create_connection((host, port), timeout=10):
                  print(f"TCP connection to {host}:{port} succeeded")
          except Exception as e:
              print(f"TCP connection to {host}:{port} failed: {e}")
              sys.exit(1)
          PY

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          port: ${{ secrets.VPS_PORT || 22 }}
          timeout: 30s
          command_timeout: 60m
          debug: true
          script: |
            set -euo pipefail
            export DEPLOY_DIR="${{ secrets.VPS_DEPLOY_PATH || '/opt/cursala/whatsapp-bot' }}"
            export BRANCH="${{ github.ref_name }}"

            sudo mkdir -p "$DEPLOY_DIR"
            sudo chown -R "${{ secrets.VPS_USER }}":"$(id -gn "${{ secrets.VPS_USER }}")" "$DEPLOY_DIR" || true

            cd "$DEPLOY_DIR"

            if [ ! -d .git ]; then
              git clone https://github.com/${{ github.repository }}.git "$DEPLOY_DIR"
              cd "$DEPLOY_DIR"
            fi

            git remote set-url origin https://github.com/${{ github.repository }}.git 2>/dev/null || true
            git fetch origin "$BRANCH"
            git checkout -B "$BRANCH" "origin/$BRANCH"
            git reset --hard "origin/$BRANCH"
            chmod +x deploy-vps.sh
            bash ./deploy-vps.sh
