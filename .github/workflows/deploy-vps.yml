name: Deploy WhatsApp bot to VPS

on:
  push:
    branches:
      - main
      - fix/enviar-credenciales
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate deployment secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          for name in VPS_HOST VPS_USER VPS_SSH_KEY; do
            if [ -z "${!name}" ]; then
              echo "Missing required secret: $name"
              exit 1
            fi
          done

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -euo pipefail
            export DEPLOY_DIR="${{ secrets.VPS_DEPLOY_PATH || '/opt/cursala/whatsapp-bot' }}"
            export BRANCH="${{ github.ref_name }}"

            sudo mkdir -p "$DEPLOY_DIR"
            sudo chown -R "${{ secrets.VPS_USER }}":"$(id -gn "${{ secrets.VPS_USER }}")" "$DEPLOY_DIR" || true

            cd "$DEPLOY_DIR"

            if [ ! -d .git ]; then
              git clone https://github.com/${{ github.repository }}.git "$DEPLOY_DIR"
              cd "$DEPLOY_DIR"
            fi

            git remote set-url origin https://github.com/${{ github.repository }}.git 2>/dev/null || true
            git fetch origin "$BRANCH"
            git checkout -B "$BRANCH" "origin/$BRANCH"
            git reset --hard "origin/$BRANCH"
            chmod +x deploy-vps.sh
            bash ./deploy-vps.sh
